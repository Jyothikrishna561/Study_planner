<!DOCTYPE html>
<html>
<head>
    <title>AI Suggestions</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Comfortaa&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #fdf6f0, #f7e6d5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeIn 0.5s ease;
            border-top: 6px solid #6C63FF;
        }

        h2 {
            color: #6C63FF;
            margin-bottom: 15px;
        }

        .ai-text {
            white-space: pre-line;
            text-align: left;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 18px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #6C63FF, #A78BFA);
            color: white;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>🤖 AI Suggestions</h2>

        <div class="ai-text">
            {{ result }}
        </div>

        <button class="btn" onclick="window.location.href='/'">
            ⬅ Back to Planner
        </button>
    </div>

</body>
</html>
